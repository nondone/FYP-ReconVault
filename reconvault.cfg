#!/bin/bash
# Path: /home/hongxuan/ReconVault/reconvault.cfg
# Global Configuration for ReconVault - Managed by Hongxuan

# --- ENVIRONMENT PATHS ---
# Ensure Go-installed binaries are available in non-interactive shells
export PATH="$PATH:/usr/local/go/bin:/home/hongxuan/go/bin"
hash -r

# --- TOOL PATHS ---
# These variables store the location of your Kali tools automatically
SUBFINDER_PATH=$(command -v subfinder)
ASSETFINDER_PATH=$(command -v assetfinder)
AMASS_PATH=$(command -v amass)
HTTPX_PATH=$(command -v httpx)
NUCLEI_PATH=$(command -v nuclei)
GOBUSTER_PATH=$(command -v gobuster)
NMAP_PATH=$(command -v nmap)

# --- NEW VULNERABILITY TOOLS ---
DALFOX_PATH=$(command -v dalfox)
SQLMAP_PATH=$(command -v sqlmap)
COMMIX_PATH=$(command -v commix)
TINJA_PATH=$(command -v tinja)
NOMORE403_PATH=$(command -v nomore403)
CRLFUZZ_PATH=$(command -v crlfuzz)
TESTSSL_PATH=$(command -v testssl)
WAYBACKURLS_PATH=$(command -v waybackurls)
GAU_PATH=$(command -v gau)
SUBZY_PATH=$(command -v subzy)
WHATWEB_PATH=$(command -v whatweb)
WAFW00F_PATH=$(command -v wafw00f)
GOWITNESS_PATH=$(command -v gowitness)

# --- WORDLISTS ---
# Standard paths for Active (Full) mode brute-forcing
DNS_WORDLIST="/usr/share/wordlists/amass/subdomains-top1mil-5000.txt"
DIR_WORDLIST="/usr/share/wordlists/dirb/common.txt"

# --- API KEYS ---
# Passive tools use these to query external databases without touching the target
export GEMINI_API_KEY="AIzaSyCRfcvY4BlH91hZaY5w7TTZ8_ZFCQ6FOLA"
export GEMINI_MODEL="gemini-3.1-flash-lite-preview"

# Keep OPENAI_API_KEY mapped for backward compatibility in older modules
export OPENAI_API_KEY="$GEMINI_API_KEY"
export VT_API_KEY="a9a2aed95fcf1c22b5891af623f02959eefeb785dc5652a63e3cae633afabfa0"
export SHODAN_API_KEY="your_shodan_key_here"

# --- SCAN SETTINGS ---
# Controls the speed and intensity of your scans
TIMEOUT=300
THREADS=50
USER_AGENT="Mozilla/5.0 (Windows NT 10.0; Win64; x64) ReconVault/1.0"
DEBUG_MODE=true
export MAX_MINING_TARGETS=300
export GAU_PARALLEL=25
export WAYBACK_TIMEOUT=120
export GAU_TIMEOUT=25


# --- LOGGING & UI COLORS ---
RS="\033[0m"
RED="\033[0;31m"
GAN="\033[0;32m"
GRN="\033[0;32m"
YEL="\033[0;33m"
BLU="\033[0;34m"
PRP="\033[0;35m"

# Helper functions for terminal feedback
log_info()    { echo -e "${BLU}[*] $(date +%H:%M:%S)${RS} $1"; }
log_success() { echo -e "${GRN}[+] $(date +%H:%M:%S)${RS} $1"; }
log_warn()    { echo -e "${YEL}[~] $(date +%H:%M:%S)${RS} $1"; }
log_error()   { echo -e "${RED}[!] $(date +%H:%M:%S)${RS} $1"; }
log_section() { echo -e "${PRP}[>] $(date +%H:%M:%S) === $1 ===${RS}"; }

# --- SYSTEM CHECK ---
# Verify critical tools exist before starting
check_dependencies() {
    local missing=0
    local critical_tools=(subfinder amass nuclei nmap httpx)
    local optional_tools=(sqlmap dalfox commix tinja nomore403 testssl waybackurls gau subzy whatweb wafw00f gowitness)

    export PATH="$PATH:/usr/local/go/bin:/home/hongxuan/go/bin"
    hash -r

    log_section "Dependency Check"

    echo -e "\n  Critical tools:"
    for tool in "${critical_tools[@]}"; do
        if command -v "$tool" &>/dev/null; then
            echo -e "  ${GRN}[OK]${RS}  $tool -> $(command -v "$tool")"
        else
            echo -e "  ${RED}[!!]${RS}  $tool -> NOT FOUND (scan may fail)"
            missing=$((missing + 1))
        fi
    done

    echo -e "\n  Optional tools:"
    for tool in "${optional_tools[@]}"; do
        if command -v "$tool" &>/dev/null; then
            echo -e "  ${GRN}[OK]${RS}  $tool -> $(command -v "$tool")"
        else
            echo -e "  ${YEL}[--]${RS}  $tool -> not installed (module will be skipped)"
        fi
    done

    echo -e "\n  API Keys:"
    [ -n "$OPENAI_API_KEY" ] && echo -e "  ${GRN}[OK]${RS}  OPENAI_API_KEY set" || echo -e "  ${YEL}[--]${RS}  OPENAI_API_KEY not set (AI params disabled)"
    [ -n "$VT_API_KEY" ] && echo -e "  ${GRN}[OK]${RS}  VT_API_KEY set" || echo -e "  ${YEL}[--]${RS}  VT_API_KEY not set"
    [ -n "$SHODAN_API_KEY" ] && echo -e "  ${GRN}[OK]${RS}  SHODAN_API_KEY set" || echo -e "  ${YEL}[--]${RS}  SHODAN_API_KEY not set"

    return $missing
}
